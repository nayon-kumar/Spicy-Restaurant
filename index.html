<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Spicy Restaurant</title>
  </head>
  <body>
    <header class="bg-[#000000] opacity-80">
      <div class="max-w-[1600px] mx-auto">
        <div
          class="flex flex-col md:flex-row justify-between items-center w-[80%] mx-auto py-[25px] gap-10"
        >
          <div class="flex items-center gap-3 cursor-pointer">
            <img class="h-[50px]" src="images/logo.png" alt="" />
            <h1 class="text-white text-[30px] font-bold">Spicy</h1>
          </div>
          <div>
            <ul
              class="flex flex-col md:flex-row gap-1 md:gap-2 text-center md:text-left"
            >
              <li
                class="text-[#FFFFFF] hover:bg-[#990000] rounded-[10px] p-[15px] cursor-pointer uppercase"
              >
                Home
              </li>
              <li
                class="text-[#FFFFFF] hover:bg-[#990000] rounded-[10px] p-[15px] cursor-pointer uppercase"
              >
                About
              </li>
              <li
                class="text-[#FFFFFF] hover:bg-[#990000] rounded-[10px] p-[15px] cursor-pointer uppercase"
              >
                Services
              </li>
              <li
                class="text-[#FFFFFF] hover:bg-[#990000] rounded-[10px] p-[15px] cursor-pointer uppercase"
              >
                Gallery
              </li>
              <li
                class="text-[#FFFFFF] hover:bg-[#990000] rounded-[10px] p-[15px] cursor-pointer uppercase"
              >
                Menu
              </li>
              <li
                class="text-[#FFFFFF] hover:bg-[#990000] rounded-[10px] p-[15px] cursor-pointer uppercase"
              >
                Contact
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
